name: CI

on:
  pull_request:
  push:
    branches: ["*"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check merge conflict markers
        run: ./scripts/check-conflicts.sh

      - name: Syntax check
        run: python -m py_compile src/app.py

      - name: API smoke test
        run: |
          python src/app.py &
          PID=$!
          sleep 2
          curl -f http://127.0.0.1:5000/healthz
          curl -f http://127.0.0.1:5000/api/students
          kill $PID
