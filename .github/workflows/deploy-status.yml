name: Deployment Status

on:
  push:
    branches: ["*"]

permissions:
  contents: read
  deployments: write

jobs:
  mark-deployed:
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment entry for branch
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              task: 'deploy:preview',
              auto_merge: false,
              required_contexts: [],
              environment: 'preview',
              transient_environment: true,
              production_environment: false,
              description: `Automatic preview deployment marker for ${context.ref}`
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Mark deployment as success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.deployment.outputs.deployment_id }}'),
              state: 'success',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              environment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${context.ref.replace('refs/heads/','')}/preview`,
              description: 'Preview deployment status recorded successfully.'
            });
